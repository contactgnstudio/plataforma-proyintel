<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambiar contraseña — GN Studio</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="gn-auth-locked">
  <main class="main-content" style="max-width:700px;margin:0 auto;padding-top:120px;">
    <section class="form-section">
      <div class="form-header">
        <h1 class="section-title">🔐 Cambiar contraseña</h1>
        <p style="margin-top:8px;color:#94a3b8;">
          Define una nueva contraseña para tu acceso de GN Studio.
        </p>
      </div>

      <form id="reset-password-form">
        <div class="form-grid">
          <div class="form-group full-width">
            <label for="new-password">Nueva contraseña</label>
            <input
              type="password"
              id="new-password"
              required
              minlength="8"
              placeholder="Mínimo 8 caracteres"
              autocomplete="new-password"
            >
          </div>

          <div class="form-group full-width">
            <label for="confirm-password">Confirmar contraseña</label>
            <input
              type="password"
              id="confirm-password"
              required
              minlength="8"
              placeholder="Repite la contraseña"
              autocomplete="new-password"
            >
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Guardar nueva contraseña</button>
        </div>

        <div class="form-feedback" id="reset-feedback"></div>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Verificar que Supabase cargó antes de usarlo
    if (!window.supabase || !window.supabase.createClient) {
      document.body.innerHTML = '<p style="text-align:center;padding:40px;color:#ef4444;font-family:sans-serif;">Error: No se pudo cargar Supabase. Recarga la página.</p>';
      throw new Error('Supabase CDN no cargó');
    }

    const SUPABASE_URL = 'https://smbphmmaswqcwmacfdxg.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_PUCx7VxzdeB75l1FqrvKSA_WbBha9mE';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function setFeedback(msg, type) {
      const el = document.getElementById('reset-feedback');
      if (!el) return;

      if (!msg) {
        el.className = 'form-feedback';
        el.textContent = '';
        el.style.display = 'none';
        return;
      }

      el.className = 'form-feedback ' + (type || 'error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function isStrongEnough(password) {
      return typeof password === 'string' && password.length >= 8;
    }

    document.getElementById('reset-password-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      const pass1 = document.getElementById('new-password').value;
      const pass2 = document.getElementById('confirm-password').value;

      if (!isStrongEnough(pass1)) {
        setFeedback('La contraseña debe tener mínimo 8 caracteres.', 'error');
        return;
      }

      if (pass1 !== pass2) {
        setFeedback('Las contraseñas no coinciden.', 'error');
        return;
      }

      try {
        const { data: sessionData } = await supabaseClient.auth.getSession();

        if (!sessionData || !sessionData.session) {
          setFeedback('El enlace no es válido o expiró. Solicita uno nuevo.', 'error');
          return;
        }

        const { error } = await supabaseClient.auth.updateUser({
          password: pass1
        });

        if (error) {
          setFeedback(error.message || 'No se pudo cambiar la contraseña.', 'error');
          return;
        }

        setFeedback('Contraseña actualizada correctamente. Serás redirigido al login.', 'success');

        setTimeout(function () {
          window.location.href = window.location.origin + '/';
        }, 1800);
      } catch (error) {
        setFeedback('No se pudo conectar con Supabase.', 'error');
      }
    });
  </script>
</body>
</html>
